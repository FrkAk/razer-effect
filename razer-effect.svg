<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <!-- Background circle -->
  <circle cx="64" cy="64" r="60" fill="#1a1a2e"/>

  <!-- Keyboard body -->
  <rect x="20" y="42" width="88" height="48" rx="6" fill="#2d2d44" stroke="#444" stroke-width="1.5"/>

  <!-- Key rows with rainbow colors -->
  <!-- Row 1 -->
  <rect x="28" y="48" width="8" height="8" rx="1.5" fill="#ff0050"/>
  <rect x="38" y="48" width="8" height="8" rx="1.5" fill="#ff00c8"/>
  <rect x="48" y="48" width="8" height="8" rx="1.5" fill="#a000ff"/>
  <rect x="58" y="48" width="8" height="8" rx="1.5" fill="#0050ff"/>
  <rect x="68" y="48" width="8" height="8" rx="1.5" fill="#00c8ff"/>
  <rect x="78" y="48" width="8" height="8" rx="1.5" fill="#00ffa0"/>
  <rect x="88" y="48" width="8" height="8" rx="1.5" fill="#00ff00"/>

  <!-- Row 2 -->
  <rect x="28" y="58" width="8" height="8" rx="1.5" fill="#ff6000"/>
  <rect x="38" y="58" width="8" height="8" rx="1.5" fill="#ff0090"/>
  <rect x="48" y="58" width="8" height="8" rx="1.5" fill="#c800ff"/>
  <rect x="58" y="58" width="8" height="8" rx="1.5" fill="#0000ff"/>
  <rect x="68" y="58" width="8" height="8" rx="1.5" fill="#00a0ff"/>
  <rect x="78" y="58" width="8" height="8" rx="1.5" fill="#00ff80"/>
  <rect x="88" y="58" width="8" height="8" rx="1.5" fill="#50ff00"/>

  <!-- Row 3 -->
  <rect x="28" y="68" width="8" height="8" rx="1.5" fill="#ffc800"/>
  <rect x="38" y="68" width="8" height="8" rx="1.5" fill="#ff0040"/>
  <rect x="48" y="68" width="8" height="8" rx="1.5" fill="#e000ff"/>
  <rect x="58" y="68" width="18" height="8" rx="1.5" fill="#0080ff"/>
  <rect x="78" y="68" width="8" height="8" rx="1.5" fill="#00ffc0"/>
  <rect x="88" y="68" width="8" height="8" rx="1.5" fill="#a0ff00"/>

  <!-- RGB glow effect -->
  <ellipse cx="64" cy="82" rx="40" ry="6" fill="url(#glow)" opacity="0.6"/>

  <defs>
    <radialGradient id="glow" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#00ff88" stop-opacity="0.8"/>
      <stop offset="50%" stop-color="#0088ff" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff00ff" stop-opacity="0"/>
    </radialGradient>
  </defs>
</svg>
